name: NBE FX Rate Scraper

on:
  schedule:
    - cron: '0 6 * * 1-5'
  workflow_dispatch:

jobs:
  scrape-nbe-rates:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - name: Fetch and store NBE FX rates
        run: |
          python3 - << SCRIPT
          import urllib.request, json, datetime, sys, os

          SUPABASE_URL = os.environ["SUPABASE_URL"]
          SUPABASE_KEY = os.environ["SUPABASE_SERVICE_ROLE_KEY"]

          TARGET_CURRENCIES = ["USD", "EUR", "GBP", "AED", "SAR", "CHF", "CNY", "JPY", "CAD", "AUD", "KES", "INR", "DJF", "DKK", "NOK", "SEK", "KWD", "ZAR"]

          today = datetime.date.today().isoformat()
          print(f"Fetching NBE rates for {today}...")

          url = f"https://api.nbe.gov.et/api/filter-exchange-rates?date={today}"
          req = urllib.request.Request(url, headers={"User-Agent": "BirrBank-Scraper/1.0"})
          with urllib.request.urlopen(req, timeout=30) as r:
              data = json.loads(r.read())

          if not data.get("success"):
              print("NBE API returned failure", data)
              sys.exit(1)

          rates = data.get("data", [])
          print(f"Got {len(rates)} currencies from NBE")

          saved = 0
          for rate in rates:
              code = rate["currency"]["code"]
              if code not in TARGET_CURRENCIES:
                  continue
              buying = float(rate["buying"])
              selling = float(rate["selling"])
              payload = json.dumps([{
                  "institution_slug": "nbe",
                  "currency_code": code,
                  "buying_rate": buying,
                  "selling_rate": selling,
                  "rate_date": today,
                  "source": "nbe_official",
                  "country_code": "ET"
              }]).encode()
              upsert_url = f"{SUPABASE_URL}/rest/v1/exchange_rates?on_conflict=institution_slug,currency_code,rate_date"
              req2 = urllib.request.Request(
                  upsert_url, data=payload,
                  headers={
                      "Content-Type": "application/json",
                      "apikey": SUPABASE_KEY,
                      "Authorization": f"Bearer {SUPABASE_KEY}",
                      "Prefer": "resolution=merge-duplicates",
                      "Accept-Profile": "birrbank",
                      "Content-Profile": "birrbank"
                  }, method="POST"
              )
              try:
                  with urllib.request.urlopen(req2, timeout=15) as r2:
                      print(f"  {code}: buy={buying} sell={selling} -> HTTP {r2.status}")
                      saved += 1
              except urllib.error.HTTPError as e:
                  print(f"  {code}: ERROR {e.code} - {e.read().decode()}")

          print(f"Done. Saved {saved} rates for {today}")
          if saved == 0:
              sys.exit(1)
          SCRIPT
