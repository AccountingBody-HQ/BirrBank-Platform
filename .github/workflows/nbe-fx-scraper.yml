name: NBE FX Rate Scraper

on:
  schedule:
    - cron: '0 6 * * 1-5'  # 9am Ethiopia time (EAT = UTC+3), weekdays only
  workflow_dispatch:        # allow manual trigger from GitHub Actions tab

jobs:
  scrape-nbe-rates:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch and store NBE FX rates
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python3 << 'SCRIPT'
          import urllib.request, json, datetime, sys

          SUPABASE_URL = "${{ secrets.SUPABASE_URL }}"
          SUPABASE_KEY = "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"

          # Target currencies BirrBank tracks
          TARGET_CURRENCIES = ["USD", "EUR", "GBP", "AED", "SAR", "CHF", "CNY", "JPY", "CAD", "AUD"]

          today = datetime.date.today().isoformat()
          print(f"Fetching NBE rates for {today}...")

          # Fetch from NBE API
          url = f"https://api.nbe.gov.et/api/filter-exchange-rates?date={today}"
          req = urllib.request.Request(url, headers={"User-Agent": "BirrBank-Scraper/1.0"})
          with urllib.request.urlopen(req, timeout=30) as r:
              data = json.loads(r.read())

          if not data.get("success"):
              print("NBE API returned failure", data)
              sys.exit(1)

          rates = data.get("data", [])
          print(f"Got {len(rates)} currencies from NBE")

          saved = 0
          for rate in rates:
              code = rate["currency"]["code"]
              if code not in TARGET_CURRENCIES:
                  continue

              buying = float(rate["buying"])
              selling = float(rate["selling"])

              payload = json.dumps({
                  "institution_slug": "nbe",
                  "currency_code": code,
                  "buying_rate": buying,
                  "selling_rate": selling,
                  "rate_date": today,
                  "last_verified_date": today,
                  "source": "nbe_official",
                  "country_code": "ET"
              }).encode()

              upsert_url = f"{SUPABASE_URL}/rest/v1/exchange_rates?on_conflict=institution_slug,currency_code,rate_date"
              req2 = urllib.request.Request(
                  upsert_url,
                  data=payload,
                  headers={
                      "Content-Type": "application/json",
                      "apikey": SUPABASE_KEY,
                      "Authorization": f"Bearer {SUPABASE_KEY}",
                      "Prefer": "resolution=merge-duplicates",
                      "Accept-Profile": "birrbank",
                      "Content-Profile": "birrbank"
                  },
                  method="POST"
              )
              with urllib.request.urlopen(req2, timeout=15) as r2:
                  status = r2.status
                  print(f"  {code}: buy={buying} sell={selling} -> HTTP {status}")
                  saved += 1

          print(f"Done. Saved {saved} rates for {today}")
          SCRIPT
